name: CI

on:
  push:
    branches:
      - "main"
      - "develop"
    tags:
      - 'v*'
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:
    inputs:
      sonar_verbose:
        description: Enable Sonar Scanner debug logging
        type: boolean
        default: false

env:
  GO_VERSION: stable
  SQC_ORG: lfrystak
  SQC_PROJECT_KEY: rptgen
  SQC_PROJECT_NAME: rptgen

jobs:

  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: gofmt
      run: test -z "$(gofmt -l .)"

    - name: go vet
      run: go vet ./...

    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
      with:
        version: v2.12
        args: >
          --output.sarif.path golangci-lint-sarif.json

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -race -v ./... -coverprofile=coverage.out

    - name: SQ Analysis
      uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=${{ env.SQC_ORG }}
          -Dsonar.projectKey=${{ env.SQC_PROJECT_KEY }}
          "-Dsonar.projectName=${{ env.SQC_PROJECT_NAME }}"
          -Dsonar.sources=.
          -Dsonar.tests=.
          -Dsonar.exclusions=**/*_test.go
          -Dsonar.test.inclusions=**/*_test.go
          -Dsonar.go.coverage.reportPaths=coverage.out
          -Dsonar.verbose=${{ inputs.sonar_verbose || false }}
          -Dsonar.sarifReportPaths=golangci-lint-sarif.json
          -Dsonar.coverage.exclusions=example/**/*.go

  release:
    runs-on: ubuntu-latest
    needs: build-test-analyze
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ./.github/actions/setup-go
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
      with:
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --clean
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
