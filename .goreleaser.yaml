version: 2

before:
  hooks:
    - go mod tidy

# rptgen is an importable library — no binary artifacts are published.
# Distribution is via git tags and `go get`/`go mod` (the standard Go module model).
# GoReleaser is kept solely for changelog generation and GitHub release notes.

builds:
  - skip: true

changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
    🙏 Thank you for using {{ .ProjectName }}!

    ❓ Any questions or issues? Please open an issue at {{ .GitURL }}/issues.

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
