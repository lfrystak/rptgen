<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smoke Test Report</title>
  <style>

*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background-color: #f1f5f9;
  color: #1e293b;
  margin: 0;
  padding: 1rem;
}
.report {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1rem;
}
.report-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 0;
  margin-bottom: 2rem;
  border-bottom: 2px solid #7c3aed;
  background: linear-gradient(135deg, #7c3aed15 0%, transparent 100%);
}
.report-header img { max-height: 48px; }
.report-title { margin: 0; color: #7c3aed; font-size: 1.5rem; }
.report-generated { font-size: 0.8rem; color: #64748b; }
.report-footer {
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid #64748b;
  font-size: 0.85rem;
  color: #64748b;
}
.report-section { margin-bottom: 2rem; }
.section-title {
  font-size: 1.1rem;
  color: #1e293b;
  margin-bottom: 1rem;
  border-left: 4px solid #7c3aed;
  padding-left: 0.5rem;
}
.section-grid {
  display: grid;
  grid-template-columns: var(--col-template, 1fr);
  gap: 1rem;
}
.canvas-grid {
  display: grid;
  grid-template-columns: var(--col-template, 1fr);
  gap: 0.75rem;
  padding: 0;
}
.element-wrapper {
  background: #ffffff;
  border-radius: 0.5rem;
  box-shadow: 0 10px 15px rgba(0,0,0,0.1);
  position: relative;
}
.tile {
  padding: 1.5rem;
  padding-top: 2rem;
  text-align: center;
  position: relative;
}
.tile-title {
  font-size: 0.85rem;
  color: #64748b;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.tile-value {
  font-size: 2rem;
  font-weight: 700;
  color: #7c3aed;
  line-height: 1.2;
}
.tile-subtitle {
  font-size: 0.8rem;
  color: #64748b;
  margin-top: 0.25rem;
}
.chart-container {
  padding: 1rem;
  position: relative;
}
.element-title {
  font-size: 1rem;
  margin: 0 0 0.75rem;
}
.table-wrapper {
  overflow-x: auto;
  padding: 1rem;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}
th {
  background-color: #7c3aed;
  color: #ffffff;
  padding: 0.6rem 1rem;
  text-align: left;
  font-weight: 600;
}
td {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid #1e293b20;
}
tbody tr:nth-child(even) td {
  background-color: #1e293b08;
}
tbody tr:hover td {
  background-color: #7c3aed15;
}
.free-text {
  padding: 1rem 1.5rem;
  line-height: 1.6;
}
.free-text p { margin: 0; }
.tooltip-icon {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  width: 1.1rem;
  height: 1.1rem;
  font-size: 1.1rem;
  line-height: 1;
  color: #9ca3af;
  cursor: help;
  z-index: 10;
}
.tooltip-icon:hover { color: #6b7280; }
.tooltip-icon::after {
  content: attr(data-tooltip);
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  min-width: 180px;
  max-width: 280px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 0.4rem 0.6rem;
  border-radius: 4px;
  font-size: 0.78rem;
  white-space: normal;
  line-height: 1.4;
  z-index: 200;
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.tooltip-icon:hover::after { display: block; }
@media (max-width: 768px) {
  .section-grid, .canvas-grid { grid-template-columns: 1fr !important; }
}
@media print {
  .element-wrapper { box-shadow: none !important; animation: none !important; }
  .section-grid, .canvas-grid { grid-template-columns: 1fr !important; }
}
  </style>
</head>
<body>
  <div class="report">
    <header class="report-header">
      <h1 class="report-title">Smoke Test Report</h1>
    </header>

    <section class="report-section">
      <h2 class="section-title">All Elements</h2>
      <div class="section-grid" style="--col-template: 1fr">
        <div class="element-wrapper">
          <div class="element tile number-tile">
            <div class="tile-title">Revenue</div>
            <div class="tile-value">$99,999.99</div>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element tile date-tile">
            <div class="tile-title">As Of</div>
            <div class="tile-value">2024-06-01 12:00:00</div>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element free-text">
            <p>Hello world</p>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element table-wrapper">
            <h3 class="element-title">Data</h3>
            <table>
              <thead><tr><th>col1</th><th>col2</th></tr></thead>
              <tbody>
                <tr><td>a</td><td>b</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element chart-container">
            <h3 class="element-title">Bar</h3>
            <canvas id="all-elements-bar"></canvas>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element chart-container">
            <h3 class="element-title">Line</h3>
            <canvas id="all-elements-line"></canvas>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element chart-container">
            <h3 class="element-title">Pie</h3>
            <canvas id="all-elements-pie"></canvas>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element chart-container">
            <h3 class="element-title">Stacked</h3>
            <canvas id="all-elements-stacked"></canvas>
          </div>
        </div>
        <div class="element-wrapper">
          <div class="element canvas-grid" style="--col-template: 1fr 1fr">
            <div class="element-wrapper">
          <div class="element tile number-tile">
            <div class="tile-title">Inside Canvas</div>
            <div class="tile-value">42</div>
          </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
(function(){var ctx=document.getElementById('all-elements-bar').getContext('2d');new Chart(ctx,{"type":"bar","data":{"labels":["X","Y"],"datasets":[{"data":[1,2],"backgroundColor":["#2563eb","#10b981"]}]},"options":{"responsive":true,"aspectRatio":2,"plugins":{"legend":{"display":false}}}});})();
(function(){var ctx=document.getElementById('all-elements-line').getContext('2d');new Chart(ctx,{"type":"line","data":{"labels":["Feb","Jan"],"datasets":[{"label":"Line","data":[20,10],"backgroundColor":"#2563eb","borderColor":"#2563eb","fill":false,"tension":0.4}]},"options":{"responsive":true,"aspectRatio":2,"plugins":{"legend":{"display":false}}}});})();
(function(){var ctx=document.getElementById('all-elements-pie').getContext('2d');new Chart(ctx,{"type":"pie","data":{"labels":["A","B"],"datasets":[{"data":[30,70],"backgroundColor":["#2563eb","#10b981"]}]},"options":{"responsive":true,"aspectRatio":2}});})();
(function(){var ctx=document.getElementById('all-elements-stacked').getContext('2d');new Chart(ctx,{"type":"bar","data":{"labels":["Q1"],"datasets":[{"label":"S1","data":[10],"backgroundColor":"#2563eb"},{"label":"S2","data":[20],"backgroundColor":"#10b981"}]},"options":{"responsive":true,"aspectRatio":2,"scales":{"x":{"stacked":true},"y":{"stacked":true}}}});})();
  </script>
</body>
</html>
